services:
  - type: web
    name: airtrainr-api
    env: node
    buildCommand: npm install -g pnpm@9.0.0 && pnpm install --frozen-lockfile && pnpm --filter @airtrainr/api run build
    startCommand: pnpm --filter @airtrainr/api run start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://air-triner-web.vercel.app
      - key: SUPABASE_ACCESS_TOKEN
        sync: false
